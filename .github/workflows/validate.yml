name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          version: 2.4.8
      - run: biome ci src/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install --no-save typescript expo-module-scripts expo expo-modules-core @types/react react react-native react-native-is-edge-to-edge
      - run: npx tsc --noEmit

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: |
          SWIFTLINT_VERSION=0.57.0
          curl -fsSL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux.zip" -o swiftlint.zip
          unzip -q swiftlint.zip -d swiftlint-bin
          sudo install swiftlint-bin/swiftlint /usr/local/bin/swiftlint
      - run: swiftlint lint --strict ios/

  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ktlint
        run: |
          KTLINT_VERSION=1.5.0
          curl -fsSL "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint" -o ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/
      - run: ktlint "android/src/**/*.kt"

  android-build:
    name: Android build (example app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install dependencies
        working-directory: example
        run: npm install
      - name: Prebuild Android
        working-directory: example
        run: npx expo prebuild --platform android
      - name: Gradle build
        working-directory: example/android
        run: ./gradlew assembleDebug
