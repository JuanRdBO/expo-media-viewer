name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: biomejs/setup-biome@v2
        with:
          version: 2.4.8
      - run: biome ci packages/expo-media-viewer/src/

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx tsc --noEmit
        working-directory: packages/expo-media-viewer

  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: |
          SWIFTLINT_VERSION=0.57.0
          curl -fsSL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux.zip" -o swiftlint.zip
          unzip -q swiftlint.zip -d swiftlint-bin
          sudo install swiftlint-bin/swiftlint /usr/local/bin/swiftlint
      - run: swiftlint lint --strict ios/
        working-directory: packages/expo-media-viewer

  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install ktlint
        run: |
          KTLINT_VERSION=1.5.0
          curl -fsSL "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint" -o ktlint
          chmod +x ktlint
          sudo mv ktlint /usr/local/bin/
      - run: ktlint "packages/expo-media-viewer/android/src/**/*.kt"
